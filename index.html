<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Marry Me? 💍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            overflow: hidden;
            background: linear-gradient(45deg, #ff6b9d, #c44569, #f8b500, #ff9f43);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: none;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            color: #ff69b4;
            font-size: 20px;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            max-width: 400px;
            padding: 20px;
            z-index: 10;
            position: relative;
        }

        .ring {
            font-size: 80px;
            margin: 20px 0;
            animation: sparkle 2s infinite;
            display: block;
        }

        @keyframes sparkle {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(10deg); }
        }

        h1 {
            font-size: 2.5em;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            animation: fadeInUp 1s ease-out;
        }

        .message {
            font-size: 1.2em;
            color: white;
            line-height: 1.6;
            margin-bottom: 30px;
            animation: fadeInUp 1s ease-out 0.3s both;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .btn {
            position: relative;
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            font-family: 'Georgia', serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 20;
            user-select: none;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .btn.yes-btn {
            background: linear-gradient(45deg, #00d4aa, #00b894);
            font-size: 1.3em;
            padding: 18px 50px;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 35px rgba(0,0,0,0.4);
        }

        .btn:active {
            transform: translateY(-1px) scale(1.02);
        }

        .no-btn {
            pointer-events: none !important;
            position: fixed !important;
            z-index: 15 !important;
            animation: none !important;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .no-btn.moving {
            animation: dodge 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes dodge {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30vw, -20vh) rotate(5deg); }
            50% { transform: translate(-20vw, 10vh) rotate(-5deg); }
            75% { transform: translate(15vw, -15vh) rotate(3deg); }
            100% { transform: translate(-10vw, 5vh) rotate(-2deg); }
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        .countdown {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 20;
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            h1 { font-size: 2em; }
            .ring { font-size: 60px; }
            .message { font-size: 1.1em; }
            .btn { padding: 12px 30px; font-size: 1.1em; }
        }

        .fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 25;
            display: none;
        }

        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: explode 1.2s ease-out forwards;
        }

        @keyframes explode {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(1) translate(var(--dx), var(--dy));
                opacity: 0;
            }
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            z-index: 30;
        }

        .celebration.active,
        .fireworks.active {
            display: flex;
        }

        .celebration h2 {
            font-size: 4em;
            margin-bottom: 30px;
            animation: bounce 1s infinite;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
        }

        .celebration p {
            font-size: 1.5em;
            margin: 10px 0;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }

        .custom-cursor {
            position: fixed;
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }
    </style>
</head>
<body>
    <div class="custom-cursor" id="cursor"></div>
    
    <div class="countdown" id="countdown">Loading love... 💕</div>
    
    <div class="hearts" id="hearts"></div>
    
    <div class="fireworks" id="fireworks"></div>
    
    <div class="celebration" id="celebration">
        <h2>🎉 SHE SAID YES! 🎉</h2>
        <p>💍 I LOVE YOU FOREVER! 💍</p>
        <p style="font-size: 2em;">Our forever starts NOW! ✨</p>
    </div>

    <div class="container">
        <div class="ring">💍</div>
        <h1 id="proposalText">[Her Name], Will You Marry Me?</h1>
        <p class="message" id="messageText">
            From the moment I met you, I knew you were my forever. 
            Every day with you feels like a dream. 
            I want to spend the rest of my life making you happy.
        </p>
        <button class="btn yes-btn" id="yesBtn" onclick="sayYes()">
            YES! 💕💍
        </button>
        <button class="btn no-btn" id="noBtn">
            No way! 😱
        </button>
    </div>

    <script>
        // Personalize
        const herName = prompt("Enter her name:") || "My Love";
        const customMessage = prompt("Enter custom message (optional):") || 
            "From the moment I met you, I knew you were my forever. Every day with you feels like a dream. I want to spend the rest of my life making you happy.";
        
        document.getElementById('proposalText').textContent = `${herName}, Will You Marry Me?`;
        document.getElementById('messageText').textContent = customMessage;

        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const cursor = document.getElementById('cursor');

        // Custom cursor
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 15 + 'px';
            cursor.style.top = e.clientY - 15 + 'px';
        });

        // Make NO button unclickable & moving
        let noClickCount = 0;
        noBtn.addEventListener('mouseenter', function(e) {
            noClickCount++;
            
            // Move button away
            const rect = this.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            
            let moveX = (x - 0.5) * -150;
            let moveY = (y - 0.5) * -150;
            
            this.style.transform = `translate(${moveX}px, ${moveY}px) rotate(${Math.sin(noClickCount) * 10}deg)`;
            this.style.background = `linear-gradient(45deg, hsl(${270 + noClickCount * 5}, 70%, 60%), hsl(${300 + noClickCount * 3}, 70%, 55%))`;
            
            this.classList.add('moving');
            setTimeout(() => this.classList.remove('moving'), 500);
            
            // Change text playfully
            const texts = ['Try again! 🥺', 'You can\'t escape love! 💕', 'Pretty please? 😍', 'I dare you! 😉', 'Forever awaits! ✨'];
            this.textContent = texts[noClickCount % texts.length];
            
            // Shake YES button encouragingly
            yesBtn.style.animation = 'wiggle 0.3s ease-in-out';
            setTimeout(() => yesBtn.style.animation = '', 300);
        });

        // Prevent right-click & context menu
        document.addEventListener('contextmenu', e => e.preventDefault());
        noBtn.addEventListener('contextmenu', e => e.preventDefault());

        // Floating hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['💖', '💕', '💗', '💝', '✨', '🌟'][Math.floor(Math.random() * 6)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.getElementById('hearts').appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }

        setInterval(createHeart, 250);

        // Countdown
        let count = 3;
        const countdownEl = document.getElementById('countdown');
        const countdownInterval = setInterval(() => {
            count--;
            if (count > 0) {
                countdownEl.textContent = `Almost ready... ${count}`;
            } else {
                countdownEl.textContent = '💕 Say YES! 💕';
                countdownEl.style.color = '#00d4aa';
                setTimeout(() => countdownEl.style.display = 'none', 2000);
                clearInterval(countdownInterval);
            }
        }, 1000);

        // YES function
        function sayYes() {
            document.body.style.cursor = 'default';
            cursor.style.display = 'none';
            
            document.getElementById('fireworks').classList.add('active');
            document.getElementById('celebration').classList.add('active');
            createFireworks();
            
            // Victory hearts explosion
            for(let i = 0; i < 100; i++) {
                setTimeout(() => createHeart(), i * 30);
            }
            
            // Confetti text
            setTimeout(() => {
                document.querySelector('.celebration h2').innerHTML = 
                    '🎉 ' + herName.toUpperCase() + ' SAID YES! 🎉';
            }, 500);
        }

        function createFireworks() {
            const fireworks = document.getElementById('fireworks');
            for(let i = 0; i < 150; i++) {
                setTimeout(() => {
                    const firework = document.createElement('div');
                    firework.className = 'firework';
                    firework.style.left = Math.random() * 100 + '%';
                    firework.style.top = Math.random() * 100 + '%';
                    
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 150 + Math.random() * 250;
                    firework.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
                    firework.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
                    
                    const colors = ['#ff6b9d', '#4ecdc4', '#45b7d1', '#f9ca24', '#ff9f43', '#00d4aa', '#fd79a8'];
                    firework.style.background = colors[Math.floor(Math.random() * colors.length)];
                    
                    fireworks.appendChild(firework);
                    setTimeout(() => firework.remove(), 1200);
                }, i * 15);
            }
        }

        // Auto-share after celebration
        setTimeout(() => {
            if (confirm('Share this magical moment? 📱💕')) {
                if (navigator.share) {
                    navigator.share({
                        title: herName + ' said YES! 💍',
                        text: 'She said YES! Our forever begins! ✨',
                        url: window.location.href
                    });
                } else {
                    prompt('Copy this link to share your joy:\n' + window.location.href);
                }
            }
        }, 8000);
    </script>
</body>
</html>
