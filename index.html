<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Marry Me? 💍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            overflow: hidden;
            background: linear-gradient(45deg, #ff6b9d, #c44569, #f8b500, #ff9f43);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            color: #ff69b4;
            font-size: 20px;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .container {
            text-align: center;
            max-width: 400px;
            padding: 20px;
            z-index: 10;
            position: relative;
        }

        .ring {
            font-size: 80px;
            margin: 20px 0;
            animation: sparkle 2s infinite;
        }

        @keyframes sparkle {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(10deg); }
        }

        h1 {
            font-size: 2.5em;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            animation: fadeInUp 1s ease-out;
        }

        .message {
            font-size: 1.2em;
            color: white;
            line-height: 1.6;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.3s both;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .btn {
            background: linear-gradient(45deg, #00d4aa, #00b894);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.3em;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            font-family: 'Georgia', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            z-index: 20;
            user-select: none;
        }

        .yes-btn {
            animation: pulse 2s infinite;
            font-size: 1.4em !important;
            padding: 20px 60px !important;
        }

        @keyframes pulse {
            0% { box-shadow: 0 10px 30px rgba(0,212,170,0.5); }
            50% { box-shadow: 0 0 50px rgba(0,212,170,0.8); }
            100% { box-shadow: 0 10px 30px rgba(0,212,170,0.5); }
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        /* NO BUTTON - THE MAGIC! */
        .no-btn {
            position: fixed !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%);
            z-index: 15;
            background: linear-gradient(45deg, #fd79a8, #e84393) !important;
            padding: 15px 40px !important;
            font-size: 1.2em !important;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) !important;
            animation: wiggle 2s infinite !important;
        }

        @keyframes wiggle {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-50%, -50%) rotate(3deg); }
            75% { transform: translate(-50%, -50%) rotate(-3deg); }
        }

        .countdown {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 20;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 2em; }
            .ring { font-size: 60px; }
            .btn { padding: 15px 35px; font-size: 1.1em; }
        }

        .fireworks, .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 30;
            display: none;
        }

        .celebration {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            pointer-events: all;
        }

        .celebration.active,
        .fireworks.active {
            display: flex;
        }

        .celebration h2 {
            font-size: 4em;
            margin-bottom: 30px;
            animation: bounce 1s infinite;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.8);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-40px); }
            60% { transform: translateY(-20px); }
        }

        .firework {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: explode 1.5s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1) translate(var(--dx), var(--dy)); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="countdown" id="countdown">Loading love... 💕</div>
    
    <div class="hearts" id="hearts"></div>
    
    <div class="fireworks" id="fireworks"></div>
    
    <div class="celebration" id="celebration">
        <h2>🎉 YES FOREVER! 🎉</h2>
        <p style="font-size: 2em;">💍 I LOVE YOU ENDLESSLY 💍</p>
        <p>Our adventure together begins NOW! ✨</p>
    </div>

    <div class="container">
        <div class="ring">💍</div>
        <h1 id="proposalText">[Her Name], Will You Marry Me?</h1>
        <p class="message" id="messageText">
            You've made every moment magical. 
            I want to spend eternity loving you.
            Say YES to our forever! 💕
        </p>
        <button class="btn yes-btn" onclick="sayYes()">
            YES! 💍💕
        </button>
        <button class="btn no-btn" id="noBtn">
            No way! 😱
        </button>
    </div>

    <script>
        // Personalize
        const herName = prompt("Enter her name:") || "My Love";
        document.getElementById('proposalText').textContent = `${herName}, Will You Marry Me?`;
        document.getElementById('messageText').textContent = 
            `You've made every moment magical. I want to spend eternity loving ${herName}. Say YES to our forever! 💕`;

        const noBtn = document.getElementById('noBtn');
        let dodgeCount = 0;
        const dodgeTexts = [
            "No way! 😱", "Try again! 🥺", "You know you want to! 💕", 
            "Pretty please? 😍", "Forever awaits! ✨", "I dare you! 😉",
            "Can't run from love! ❤️", "Say YES already! 🥰"
        ];

        // **THE MAGIC DODGE EFFECT**
        noBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        });

        noBtn.addEventListener('mousedown', function(e) {
            dodgeCount++;
            e.preventDefault();
            
            // Get mouse position relative to button
            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Calculate dodge direction (opposite of click)
            const dodgeX = (x / rect.width - 0.5) * 200;
            const dodgeY = (y / rect.height - 0.5) * 200;
            
            // Move button AWAY from click
            this.style.transform = `translate(${dodgeX}px, ${dodgeY}px) rotate(${Math.sin(dodgeCount) * 15}deg) scale(0.95)`;
            
            // Change text & color
            this.textContent = dodgeTexts[dodgeCount % dodgeTexts.length];
            this.style.background = `linear-gradient(45deg, hsl(${300 + dodgeCount * 8}, 75%, 65%), hsl(${330 + dodgeCount * 5}, 75%, 60%))`;
            
            // Shake YES button
            document.querySelector('.yes-btn').style.animation = 'wiggle 0.4s ease-in-out';
            setTimeout(() => {
                document.querySelector('.yes-btn').style.animation = 'pulse 2s infinite';
            }, 400);
            
            // Return to wiggle after dodge
            setTimeout(() => {
                this.style.transform = 'translate(-50%, -50%) rotate(0deg) scale(1)';
            }, 600);
            
            return false;
        });

        // Continuous wiggle animation
        setInterval(() => {
            if (!document.getElementById('celebration').classList.contains('active')) {
                noBtn.style.transform = `translate(-50%, -50%) rotate(${Math.sin(Date.now() * 0.001) * 5}deg)`;
            }
        }, 100);

        // Floating hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['💖','💕','💗','💝','✨','🌟'][Math.floor(Math.random()*6)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (Math.random()*3 + 4) + 's';
            document.getElementById('hearts').appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }
        setInterval(createHeart, 200);

        // Countdown
        let count = 3;
        const countdownEl = document.getElementById('countdown');
        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                countdownEl.textContent = `Get ready... ${count}`;
            } else {
                countdownEl.textContent = '💕 Click YES! 💕';
                countdownEl.style.color = '#00d4aa';
                setTimeout(() => countdownEl.remove(), 2000);
                clearInterval(interval);
            }
        }, 800);

        // YES - VICTORY!
        function sayYes() {
            document.querySelector('.container').style.display = 'none';
            noBtn.style.display = 'none';
            
            const celebration = document.getElementById('celebration');
            const fireworks = document.getElementById('fireworks');
            
            celebration.classList.add('active');
            fireworks.classList.add('active');
            celebration.querySelector('h2').textContent = `🎉 ${herName.toUpperCase()} SAID YES! 🎉`;
            
            createFireworks();
            
            // Heart explosion
            for(let i = 0; i < 200; i++) {
                setTimeout(createHeart, i * 20);
            }
        }

        function createFireworks() {
            const fireworks = document.getElementById('fireworks');
            for(let i = 0; i < 200; i++) {
                setTimeout(() => {
                    const fw = document.createElement('div');
                    fw.className = 'firework';
                    fw.style.left = Math.random() * 100 + '%';
                    fw.style.top = Math.random() * 100 + '%';
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 200 + Math.random() * 300;
                    fw.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
                    fw.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
                    fw.style.background = ['#ff6b9d','#00d4aa','#f9ca24','#fd79a8','white','#45b7d1'][Math.floor(Math.random()*6)];
                    fireworks.appendChild(fw);
                    setTimeout(() => fw.remove(), 1500);
                }, i * 10);
            }
        }
    </script>
</body>
</html>
